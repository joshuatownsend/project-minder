name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.19.0', '22.12.0']
    steps:
      - uses: actions/checkout@v7

      # pnpm/action-setup must run before setup-node so the pnpm binary is
      # on PATH when setup-node computes the `cache: 'pnpm'` key. Version is
      # read from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Fails loudly if the better-sqlite3 native driver didn't build, instead
      # of silently letting the ~34 DB-backed test suites skip and CI go green.
      - name: Assert better-sqlite3 native driver loaded
        run: node -e "const D=require('better-sqlite3'); const db=new D(':memory:'); db.prepare('select 1 as x').get(); db.close(); console.log('better-sqlite3 native driver OK')"

      - name: Lint
        run: pnpm lint

      - name: Type-check (tsgo)
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  verify-windows:
    # Windows coverage: the app targets Windows (dev port, path handling,
    # better-sqlite3 native driver). Previously advisory (continue-on-error)
    # while a windows-latest native-build gap kept it red (#264); now that the
    # job builds cleanly via the Node 22 prebuilt binary it is a hard gate, so
    # future Windows-only regressions block the merge instead of being masked.
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      # Node 22 (not 20) is deliberate on Windows: better-sqlite3@12.11.1 ships
      # a prebuilt win32-x64 binary for Node 22's ABI (node-v127) but NOT for
      # Node 20's (ABI 115). On Node 20 `prebuild-install` finds no prebuilt and
      # falls back to `node-gyp`, which cannot detect Visual Studio 2026 (v18)
      # on the current windows-latest image (issue #264) — so the native driver
      # never builds and every DB-backed suite fails. Node 22 gets the prebuilt
      # binary with zero compiler involvement. Node 20 stays covered on ubuntu.
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Same native-driver assertion as the ubuntu job: on Windows the
      # better-sqlite3 build can fail independently, and without this the
      # DB-backed suites would silently skip and the advisory job go green,
      # hiding the exact Windows-native signal this job exists to provide.
      - name: Assert better-sqlite3 native driver loaded
        run: node -e "const D=require('better-sqlite3'); const db=new D(':memory:'); db.prepare('select 1 as x').get(); db.close(); console.log('better-sqlite3 native driver OK')"

      - name: Lint
        run: pnpm lint

      - name: Type-check (tsgo)
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
