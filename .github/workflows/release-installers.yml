# Release installers for the Project Minder tray app (plan task C4).
#
# Builds the native tray desktop installers for all three platforms and attaches
# them to the GitHub Release for the tag. Each job:
#   1. pnpm install (frozen) + pnpm build
#   2. pnpm package:standalone            -> dist/minder-server (the Node sidecar payload)
#   3. payload hygiene gate               -> fails if .git/.env*/.claude/.mcp.json/agentlytics-repo leaked (issue #284)
#   4. fetch a PINNED Node runtime        -> dist/node (SHA-256 verified from nodejs.org)
#   5. pnpm tauri build --bundles <os>    -> bundles dist/minder-server + dist/node as Tauri resources
#
# Both dist/minder-server and dist/node are declared as Tauri `resources` in
# src-tauri/tauri.conf.json, so they land under the app's resource dir at
# runtime; src-tauri/src/config.rs resolves the bundled Node
# (<resource_dir>/node/node.exe | node/bin/node) and the payload
# (<resource_dir>/minder-server) from there.
#
# Node pin: the bundled runtime AND the packaging Node are both 22.12.0. This is
# load-bearing: package:standalone bundles better-sqlite3's prebuilt .node binary,
# which is ABI-tied (NODE_MODULE_VERSION) to the Node major that RUNS the server.
# Node 22 ships a better-sqlite3@12 prebuilt on every target OS (the same reason
# ci.yml builds Windows on 22.12.0). Change NODE_VERSION here AND in
# scripts/fetch-node-runtime.mjs together.
#
# Bundles per OS: NSIS .exe (Windows x64), .dmg (macOS arm64 on macos-latest),
# .app.tar.gz (macOS Intel x86_64 on macos-26-intel — DMG creation fails
# deterministically there, see the matrix comment), .AppImage + .deb (Linux
# x64, built on ubuntu-22.04 for the oldest supported glibc baseline).
#
# Signing: UNSIGNED for now — C5 (signing + updater) is a separate, opt-in task.
# No signing env vars are set and no updater is configured in tauri.conf.json, so
# tauri build emits plain unsigned installers.
#
# Artifact sizes: EXPECT ~100 MB+ per installer. The bundled Node runtime
# (~80 MB) plus the standalone Next server payload (hundreds of MB uncompressed,
# incl. .next/server/chunks + the dereferenced node_modules) dominate — this is
# expected and acceptable for a self-contained "no Node install required" tray app.
#
# Triggers: a `v*` tag PUSH attaches installers to that tag's Release (which
# release.yml creates with generated notes); `workflow_dispatch` is ALWAYS a dry
# run that only uploads installers to the workflow run — it never touches a
# Release, even when dispatched against a tag ref (the upload step is gated on
# github.event_name == 'push', not just the ref).

name: Release Installers

on:
  push:
    tags:
      - 'v*'
  # A manual run is ALWAYS a dry run: it has no tag, so the release-upload step
  # (gated on refs/tags/v*) is skipped and installers only land on the workflow
  # run as artifacts. No inputs — there is nothing to toggle.
  workflow_dispatch:

permissions:
  contents: write # attach installers to the GitHub Release

concurrency:
  group: release-installers-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22.12.0'

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows (NSIS .exe)
            bundles: nsis
          # macos-latest is the arm64 (Apple Silicon) runner; the Intel runner
          # is a separate label. arm64 builds a .dmg. Intel builds the bare
          # .app instead (collected as a .tar.gz below): DMG bundling fails
          # DETERMINISTICALLY on the Intel runner — bundle_dmg.sh creates and
          # mounts the image fine, then `hdiutil detach` dies with "timeout
          # for DiskArbitration expired / drive not detached" (create-dmg#72)
          # on every attempt, with XProtect stopped AND Spotlight indexing
          # disabled, across 3 dry-run rounds — while the identical arm64 job
          # passes. The .app tar.gz needs no hdiutil at all.
          - os: macos-latest
            name: macOS arm64 (.dmg)
            bundles: dmg
          - os: macos-26-intel
            name: macOS x86_64 (.app.tar.gz)
            bundles: app
          # Pin Linux to the OLDEST supported base (22.04), not ubuntu-latest
          # (24.04): AppImage/glibc-linked binaries bake in the build host's
          # glibc baseline, and Tauri's AppImage guidance is to build on the
          # oldest distro you intend to support so newer hosts still run it.
          - os: ubuntu-22.04
            name: Linux (.AppImage + .deb)
            bundles: deb,appimage

    steps:
      - uses: actions/checkout@v7

      # Linux-only: Tauri v2 build/runtime system dependencies. This is the
      # Tauri v2 prerequisites list (Debian) — libwebkit2gtk-4.1-dev IS packaged
      # on Ubuntu 22.04 — plus patchelf and libfuse2, which the AppImage tooling
      # needs (patchelf to rewrite the ELF, libfuse2 for the AppImage runtime).
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      # pnpm before setup-node so the binary is on PATH for the pnpm cache key
      # (version comes from the packageManager field in package.json).
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The packaged sidecar bundles better-sqlite3's prebuilt native driver;
      # fail loudly here if it didn't load under the pinned Node, rather than
      # deep inside package:standalone's dlopen ABI check (same guard as ci.yml).
      - name: Assert better-sqlite3 native driver loaded
        run: node -e "const D=require('better-sqlite3'); const db=new D(':memory:'); db.prepare('select 1 as x').get(); db.close(); console.log('better-sqlite3 native driver OK')"

      - name: Build Next app
        run: pnpm build

      - name: Package standalone server payload
        run: pnpm package:standalone

      # Guard (issue #284): fail before bundling if the payload over-traced any
      # forbidden entry into dist/minder-server.
      - name: Payload hygiene gate
        run: node scripts/verify-payload-hygiene.mjs

      # Download + SHA-256-verify the pinned Node runtime for this OS/arch into
      # dist/node (the Tauri `node` resource).
      - name: Fetch pinned Node runtime
        run: node scripts/fetch-node-runtime.mjs

      # Build the tray app + bundle the installers. UNSIGNED (see header). No
      # beforeBuildCommand runs (frontendDist is a static ./frontend), so this
      # does not rebuild the Next app or spawn the server.
      # Stamp the real app version into tauri.conf.json before bundling, so
      # installers don't ship the placeholder 0.1.0. package.json is the single
      # source of truth (release.yml's chore(release) bumps it and the tag
      # matches). On a tag push, assert package.json == tag (minus the leading
      # `v`) and fail loudly on mismatch — catches a mistagged release. Dispatch
      # dry runs stamp package.json as-is. Rewriting the workspace file (vs a
      # `--config` inline-JSON merge) keeps the build step shell-agnostic — no
      # cross-shell JSON quoting between pwsh (Windows) and bash.
      - name: Stamp app version from package.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$VERSION" != "$TAG_VERSION" ]; then
              echo "::error::package.json version ($VERSION) != tag $GITHUB_REF_NAME (expected $TAG_VERSION). Fix the version bump or the tag before releasing."
              exit 1
            fi
          fi
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n');console.log('stamped tauri.conf.json version =',c.version);" "$VERSION"

      # macOS: two background services hold locks on the freshly-written /
      # freshly-mounted DMG contents and break bundling on the slower Intel
      # runners (the arm64 runner finishes before the scans pile up):
      #   - XProtect's behavior service scans new files ("Resource busy" on
      #     hdiutil create — actions/runner-images#7522);
      #   - Spotlight (mds) indexes the mounted interstitial volume (~50k
      #     node_modules files), so `hdiutil detach` dies with "timeout for
      #     DiskArbitration expired / drive not detached" (create-dmg#72 —
      #     the exact failure the --verbose retry surfaced).
      # Stop XProtect and disable Spotlight indexing before bundling.
      - name: Workaround macOS hdiutil locks (stop XProtect, disable Spotlight)
        if: startsWith(matrix.os, 'macos')
        run: |
          sudo pkill -9 XProtect || true
          sudo mdutil -a -i off || true
          sleep 3

      # Two attempts: macOS DMG bundling (bundle_dmg.sh -> hdiutil) can still
      # be flaky on GitHub's macOS runners even with XProtect stopped. A retry
      # re-uses the cargo cache, so the second attempt only re-bundles — and
      # runs --verbose so a persistent failure finally surfaces bundle_dmg's
      # own output (tauri suppresses it otherwise).
      - name: Build Tauri installers
        shell: bash
        run: |
          set -u
          for attempt in 1 2; do
            EXTRA=""
            [ "$attempt" = "2" ] && EXTRA="--verbose"
            if pnpm tauri build --bundles ${{ matrix.bundles }} $EXTRA; then
              exit 0
            fi
            echo "::warning::tauri build attempt $attempt failed"
          done
          echo "::error::tauri build failed after 2 attempts"
          exit 1

      # Collect the produced installers into one dir for uniform upload. Only the
      # patterns relevant to this OS match; nullglob drops the rest.
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p installers
          shopt -s nullglob
          for f in \
            src-tauri/target/release/bundle/nsis/*.exe \
            src-tauri/target/release/bundle/dmg/*.dmg \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/appimage/*.AppImage; do
            echo "collecting $f"
            cp "$f" installers/
          done
          # Intel macOS ships the bare .app as a tar.gz (see the matrix
          # comment: hdiutil detach times out deterministically there, so no
          # DMG can be produced). Named like Tauri names DMGs —
          # <Product>_<version>_x64 — so Release assets stay consistent.
          if [[ "${{ runner.os }}" == "macOS" && "${{ matrix.bundles }}" == "app" ]]; then
            VERSION="$(node -p "require('./package.json').version")"
            for app in src-tauri/target/release/bundle/macos/*.app; do
              [ -d "$app" ] || continue
              out="installers/$(basename "${app%.app}")_${VERSION}_x64.app.tar.gz"
              echo "collecting $app -> $out"
              tar -czf "$out" -C "$(dirname "$app")" "$(basename "$app")"
            done
          fi
          echo "--- installers ---"
          ls -la installers
          if [ -z "$(ls -A installers)" ]; then
            echo "::error::no installers were produced for ${{ matrix.os }}"
            exit 1
          fi

      # Always keep the installers on the workflow run (this is the whole output
      # of a workflow_dispatch dry run).
      - name: Upload installers to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: minder-installers-${{ matrix.os }}
          path: installers/*
          if-no-files-found: error

      # Tag builds only: attach installers to the tag's GitHub Release. release.yml
      # (the existing "Release" workflow) is the SOLE creator of the Release — it
      # runs install/lint/typecheck/test/build first, then creates the Release
      # with generated notes for the same `v*` tag. This step NEVER creates the
      # Release (single-writer by design: a matrix-job create would bypass that
      # validation and could race/collide with release.yml); it only waits for
      # the Release to appear and then uploads. Tag PUSH only — never a manual
      # dispatch, even one targeting a tag ref (github.ref would be refs/tags/v…
      # there too); gating on event_name keeps manual runs artifact-only. This is
      # the sole Release-mutating step.
      - name: Attach installers to the GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "waiting for Release $TAG (created by release.yml, the sole Release creator)…"
          # `gh release view` inside the `if` condition can't trip `set -e`
          # (conditionals are exempt), so a transient probe failure just
          # retries the loop rather than killing the job.
          for i in $(seq 1 60); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG found."
              break
            fi
            echo "  not yet ($i/60) — sleeping 10s"
            sleep 10
          done
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG does not exist after ~10 min. release.yml is the sole creator of the Release (it validates then creates it); this step never creates one, to preserve single-writer + validation. Ensure release.yml succeeded for $TAG — recent runs:"
            gh run list --workflow=release.yml --branch "$TAG" --limit 5 || true
            exit 1
          fi
          # Idempotent: concurrent matrix jobs upload distinct per-OS installer
          # files; --clobber also covers a same-file re-run.
          gh release upload "$TAG" installers/* --clobber
          echo "uploaded installers to Release $TAG"
